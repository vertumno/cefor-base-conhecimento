<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Conhecimento CEFOR — Inventario</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafafa;--card:#fff;--text:#1d1d1f;--text2:#86868b;--accent:#0071e3;--border:#e5e5e7;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--purple:#af52de;--r:16px;--rs:10px;--sh:0 2px 12px rgba(0,0,0,.06);--shl:0 8px 40px rgba(0,0,0,.08);--tr:all .3s cubic-bezier(.25,.1,.25,1)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.hero{text-align:center;padding:80px 24px 48px;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%)}
.hero h1{font-size:clamp(2.5rem,5vw,4rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,var(--text) 0%,#6e6e73 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1.25rem;color:var(--text2);max-width:600px;margin:0 auto}
.hero .date{font-size:.85rem;color:var(--text2);margin-top:8px}
.upload-zone{max-width:480px;margin:32px auto;padding:48px 32px;border:2px dashed var(--border);border-radius:var(--r);text-align:center;cursor:pointer;transition:var(--tr);background:var(--card)}
.upload-zone:hover{border-color:var(--accent);background:#f0f7ff}
.upload-zone.drag{border-color:var(--accent);background:#e8f0fe;transform:scale(1.02)}
.upload-zone svg{width:48px;height:48px;color:var(--text2);margin-bottom:12px}
.upload-zone h3{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.upload-zone p{font-size:.85rem;color:var(--text2)}
.upload-zone input{display:none}
.stats-bar{display:flex;justify-content:center;gap:40px;padding:32px 24px;flex-wrap:wrap}
.stat{text-align:center}.stat-n{font-size:3rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.stat-l{font-size:.8rem;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.tabs-c{max-width:1200px;margin:0 auto;padding:0 24px 80px}
.tabs-nav{display:flex;gap:4px;background:#e8e8ed;border-radius:12px;padding:4px;margin-bottom:32px;overflow-x:auto}
.tab-btn{flex:1;min-width:max-content;padding:10px 20px;border:none;background:0 0;color:var(--text2);font-family:inherit;font-size:.85rem;font-weight:600;border-radius:9px;cursor:pointer;transition:var(--tr);white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tab-panel{display:none;animation:fi .4s ease}.tab-panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.search-bar{position:relative;margin-bottom:24px}
.search-bar input{width:100%;padding:14px 20px 14px 48px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:.95rem;background:var(--card);color:var(--text);outline:0;transition:var(--tr)}
.search-bar input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text2);width:20px;height:20px;pointer-events:none}
.sc{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:.8rem;color:var(--text2);font-weight:500}
.tw{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.875rem}
thead{position:sticky;top:0;z-index:2}
th{background:#f5f5f7;padding:12px 16px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}th.sa::after{content:' \2191'}th.sd::after{content:' \2193'}
td{padding:12px 16px;border-bottom:1px solid #f0f0f2;vertical-align:top}
tr:last-child td{border-bottom:none}tr:hover td{background:#f8f8fa}
td a{color:var(--accent);text-decoration:none;font-weight:500}td a:hover{text-decoration:underline}
.b{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap;margin:1px}
.bc{background:#f0f0f5;color:#555}.bt{background:#e8f4fd;color:#0071e3}.bo{background:#e8fae8;color:#1b7a1b}
.bw{background:#fff3e0;color:#b36b00}.be{background:#ffebee;color:#c62828}.bp{background:#f3e8ff;color:#7b2cbf}
.bsc{background:#ff3b30;color:#fff}.bsa{background:#ff9500;color:#fff}.bsm{background:#ffcc00;color:#333}.bsb{background:#34c759;color:#fff}
.br{display:flex;gap:4px;flex-wrap:wrap}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:24px}
.cd{background:var(--card);border-radius:var(--r);padding:24px;box-shadow:var(--sh);transition:var(--tr);border:1px solid var(--border)}
.cd:hover{box-shadow:var(--shl);transform:translateY(-2px)}
.ct{font-size:1rem;font-weight:700;margin-bottom:4px}.cs{font-size:.8rem;color:var(--text2);margin-bottom:16px}
.cn{font-size:2.5rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.cb{height:6px;background:#f0f0f2;border-radius:3px;margin-top:16px;overflow:hidden}
.cbf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.25,.1,.25,1)}
.rc{display:flex;justify-content:center;gap:48px;flex-wrap:wrap;margin:32px 0}.ri{text-align:center}.ri svg{width:120px;height:120px}
.cbi{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cbl{width:200px;text-align:right;font-size:.82rem;font-weight:500;flex-shrink:0}
.cbt{flex:1;height:28px;background:#f0f0f2;border-radius:6px;overflow:hidden}
.cbfl{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:.75rem;font-weight:700;color:#fff;transition:width 1s cubic-bezier(.25,.1,.25,1);min-width:fit-content}
.cbc{width:36px;text-align:right;font-size:.82rem;font-weight:700;flex-shrink:0}
.hidden{display:none!important}
@media(max-width:768px){.hero h1{font-size:2rem}.stats-bar{gap:24px}.stat-n{font-size:2rem}.tab-btn{padding:8px 14px;font-size:.78rem}.cbl{width:120px}.cg{grid-template-columns:1fr}}
</style>
</head>
<body>
<section class="hero">
  <h1>Base de Conhecimento</h1>
  <p>Inventario completo da base atual do CEFOR/IFES</p>
  <div class="date">Analise realizada em 03-04 de abril de 2026</div>
</section>
<div id="uploadSection">
  <div class="upload-zone" id="dropZone">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
    <h3>Carregar JSON do inventario</h3>
    <p>Arraste <strong>base-conhecimento-cefor-inventario.json</strong> aqui<br>ou clique para selecionar</p>
    <input type="file" id="fileInput" accept=".json">
  </div>
</div>
<section class="stats-bar hidden" id="sB"></section>
<section class="tabs-c hidden" id="mainContent">
  <nav class="tabs-nav" id="tN"></nav>
  <div id="tC"></div>
</section>
<script>
(function(){
  const $ = (s,c=document)=>c.querySelector(s);
  const $$ = (s,c=document)=>[...c.querySelectorAll(s)];
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const dropZone = $('#dropZone');
  const fileInput = $('#fileInput');
  const uploadSection = $('#uploadSection');
  const sB = $('#sB');
  const mainContent = $('#mainContent');
  const tN = $('#tN');
  const tC = $('#tC');

  dropZone.addEventListener('click', ()=>fileInput.click());
  fileInput.addEventListener('change', e=>{
    const f = e.target.files[0]; if(f) loadFile(f);
  });
  ['dragenter','dragover'].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();dropZone.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();dropZone.classList.remove('drag');}));
  dropZone.addEventListener('drop', e=>{
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if(f) loadFile(f);
  });
  // Auto-load se o arquivo estiver ao lado
  fetch('base-conhecimento-cefor-inventario.json').then(r=>r.ok?r.json():null).then(d=>{ if(d) render(d); }).catch(()=>{});

  function loadFile(file){
    const r = new FileReader();
    r.onload = e=>{
      try { render(JSON.parse(e.target.result)); }
      catch(err){ alert('JSON invalido: '+err.message); }
    };
    r.readAsText(file,'utf-8');
  }

  function render(data){
    uploadSection.classList.add('hidden');
    sB.classList.remove('hidden');
    mainContent.classList.remove('hidden');
    renderStats(data.meta||{});
    buildTabs(data);
  }

  function renderStats(m){
    const stats = [
      ['total_artigos','Artigos'],
      ['total_percursos','Percursos'],
      ['categorias_unicas','Categorias'],
      ['temas_unicos','Temas'],
    ];
    sB.innerHTML = stats.map(([k,l])=>`<div class="stat"><div class="stat-n">${esc(m[k]??'-')}</div><div class="stat-l">${l}</div></div>`).join('')
      + `<div class="stat"><div class="stat-n" style="font-size:1.4rem;line-height:1.6">${esc(m.plataforma||'-')}</div><div class="stat-l">Plataforma</div></div>`;
  }

  function buildTabs(d){
    const tabs = [
      {id:'percursos', label:'Percursos', render:()=>tabPercursos(d.percursos||[])},
      {id:'artigos', label:'Artigos', render:()=>tabArtigos(d.artigos||[])},
      {id:'categorias', label:'Categorias', render:()=>tabTax(d.taxonomias?.categorias||{}, 'categoria')},
      {id:'temas', label:'Temas', render:()=>tabTax(d.taxonomias?.temas||{}, 'tema')},
      {id:'problemas', label:'Problemas', render:()=>tabProblemas(d.problemas||[])},
    ];
    tN.innerHTML = tabs.map((t,i)=>`<button class="tab-btn ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
    tC.innerHTML = tabs.map((t,i)=>`<div class="tab-panel ${i===0?'active':''}" id="p-${t.id}"></div>`).join('');
    tabs.forEach(t=>{ $('#p-'+t.id).innerHTML = t.render(); });
    $$('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
      $$('.tab-btn').forEach(x=>x.classList.remove('active'));
      $$('.tab-panel').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      $('#p-'+b.dataset.tab).classList.add('active');
    }));
    wireSearches();
    wireSorts();
  }

  function searchBar(id,ph){
    return `<div class="search-bar">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"/></svg>
      <input type="text" id="${id}" placeholder="${ph}">
    </div>`;
  }

  function tabPercursos(list){
    const rows = list.map(p=>`<tr>
      <td><strong>${esc(p.nome)}</strong><br><a href="${esc(p.url)}" target="_blank">${esc(p.slug)}</a></td>
      <td data-n="${p.qtd_declarada||0}">${p.qtd_declarada||0}</td>
      <td data-n="${p.qtd_encontrada||0}">${p.qtd_encontrada||0}</td>
      <td><span class="b ${p.status==='OK'?'bo':'bw'}">${esc(p.status)}</span></td>
    </tr>`).join('');
    return searchBar('s-percursos','Buscar percurso...') + `<div class="tw"><div class="ts"><table data-table="percursos">
      <thead><tr><th data-sort="text">Percurso</th><th data-sort="num">Declarado</th><th data-sort="num">Encontrado</th><th data-sort="text">Status</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
  }

  function tabArtigos(list){
    const rows = list.map(a=>`<tr>
      <td>${a.id}</td>
      <td><a href="${esc(a.url)}" target="_blank"><strong>${esc(a.titulo)}</strong></a><br><small style="color:var(--text2)">${esc(a.slug)}</small></td>
      <td><span class="b bc">${esc(a.categoria||'-')}</span></td>
      <td><div class="br">${(a.temas||[]).map(t=>`<span class="b bt">${esc(t)}</span>`).join('')||'<span style="color:var(--text2)">-</span>'}</div></td>
      <td><span class="b bp">${esc(a.tipo||'-')}</span></td>
      <td data-n="${(a.percursos||[]).length}">${(a.percursos||[]).length}</td>
      <td>${a.alerta_obsoleto?`<span class="b be">${esc(a.alerta_obsoleto)}</span>`:'<span style="color:var(--green)">OK</span>'}</td>
    </tr>`).join('');
    return searchBar('s-artigos','Buscar artigo, categoria, tema...') + `<div class="tw"><div class="ts"><table data-table="artigos">
      <thead><tr><th data-sort="num">ID</th><th data-sort="text">Titulo</th><th data-sort="text">Categoria</th><th data-sort="text">Temas</th><th data-sort="text">Tipo</th><th data-sort="num">Percursos</th><th data-sort="text">Alerta</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
  }

  function tabTax(obj,label){
    const entries = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    const max = entries.length ? entries[0][1] : 1;
    const rows = entries.map(([k,v])=>`<tr>
      <td><strong>${esc(k)}</strong></td>
      <td data-n="${v}">${v}</td>
      <td style="min-width:200px"><div class="cb"><div class="cbf" style="width:${(v/max*100).toFixed(1)}%;background:var(--accent)"></div></div></td>
    </tr>`).join('');
    return searchBar('s-'+label,'Buscar '+label+'...') + `<div class="tw"><div class="ts"><table data-table="${label}">
      <thead><tr><th data-sort="text">${label[0].toUpperCase()+label.slice(1)}</th><th data-sort="num">Artigos</th><th>Distribuicao</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
  }

  function tabProblemas(list){
    const sevClass = {CRITICA:'bsc',ALTA:'bsa',MEDIA:'bsm',BAIXA:'bsb'};
    const rows = list.map(p=>`<tr>
      <td><span class="b ${sevClass[p.severidade]||'bc'}">${esc(p.severidade)}</span></td>
      <td><strong>${esc(p.problema)}</strong></td>
      <td>${esc(p.impacto)}</td>
      <td>${esc(p.afetados)}</td>
    </tr>`).join('');
    return searchBar('s-problemas','Buscar problema...') + `<div class="tw"><div class="ts"><table data-table="problemas">
      <thead><tr><th data-sort="text">Severidade</th><th data-sort="text">Problema</th><th data-sort="text">Impacto</th><th data-sort="text">Afetados</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
  }

  function wireSearches(){
    $$('.search-bar input').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const q = inp.value.toLowerCase();
        const table = inp.closest('.tab-panel').querySelector('table');
        $$('tbody tr',table).forEach(tr=>{
          tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
      });
    });
  }

  function wireSorts(){
    $$('table').forEach(table=>{
      $$('th[data-sort]',table).forEach((th,idx)=>{
        th.addEventListener('click',()=>{
          const type = th.dataset.sort;
          const asc = !th.classList.contains('sa');
          $$('th',table).forEach(x=>x.classList.remove('sa','sd'));
          th.classList.add(asc?'sa':'sd');
          const rows = $$('tbody tr',table);
          rows.sort((a,b)=>{
            const A = a.children[idx], B = b.children[idx];
            if(type==='num'){
              return (parseFloat(A.dataset.n||A.textContent)||0) - (parseFloat(B.dataset.n||B.textContent)||0);
            }
            return A.textContent.localeCompare(B.textContent,'pt-BR');
          });
          if(!asc) rows.reverse();
          const tb = table.querySelector('tbody');
          rows.forEach(r=>tb.appendChild(r));
        });
      });
    });
  }
})();
</script>
</body>
</html>
